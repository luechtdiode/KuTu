<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Riege '{{ editName }}' bearbeiten</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Abbrechen</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-label position="stacked">Durchgang</ion-label>
      <ion-input [(ngModel)]="editDurchgang" placeholder="Durchgang"></ion-input>
    </ion-item>
    <ion-item lines="none">
      <ion-label position="stacked">Startgerät</ion-label>
    </ion-item>
    <ion-radio-group [(ngModel)]="selectedStartId">
      @for (d of disziplinen; track d.id) {
        <ion-item lines="none" class="compact-radio">
          <ion-radio [value]="d.id" slot="start"></ion-radio>
          <ion-label>{{ d.name }}</ion-label>
        </ion-item>
      }
    </ion-radio-group>
  </ion-list>

  <div class="ion-padding">
    <ion-button expand="block" [disabled]="!editName.trim() || !editDurchgang.trim()" (click)="confirm()">
      Speichern
    </ion-button>
  </div>
</ion-content>
